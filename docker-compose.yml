services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vault_indexer
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/vault_indexer
      PORT: 4000
      RPC_URL: ${RPC_URL:-http://host.docker.internal:8545}
      VAULT_ADDRESS: ${VAULT_ADDRESS:-}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
